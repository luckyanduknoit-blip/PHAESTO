<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phāesto — Certificate of Authenticity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0A0A0A;
      --color-surface: #0F0F0F;
      --color-border: rgba(245, 243, 240, 0.08);
      --color-divider: rgba(245, 243, 240, 0.05);
      --color-text: #F5F3F0;
      --color-text-muted: #8A8880;
      --color-text-faint: #4A4945;
      --color-accent: #B8B0A4;
      --color-gold: #C9A96E;
      --font: 'Cormorant Garamond', 'Georgia', serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* GRAIN */
    .grain {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 9999; opacity: 0.025; mix-blend-mode: overlay;
    }

    /* LOADING */
    #loading {
      position: fixed; inset: 0; background: var(--color-bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2rem; z-index: 1000;
      transition: opacity 1s var(--ease);
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .loading-sigil {
      width: clamp(40px, 6vw, 64px); height: clamp(40px, 6vw, 64px);
      animation: spin 6s linear infinite; opacity: 0.45;
    }
    .loading-sigil img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: clamp(0.6rem, 0.5rem + 0.3vw, 0.75rem);
      letter-spacing: 0.45em; text-transform: uppercase;
      color: var(--color-text-faint); font-style: italic;
    }

    /* ERROR */
    #error-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; gap: 1.5rem;
      text-align: center; padding: 2rem;
    }
    #error-state.visible { display: flex; }
    .error-eyebrow {
      font-size: 0.6rem; letter-spacing: 0.6em;
      text-transform: uppercase; color: var(--color-text-faint);
    }
    .error-heading {
      font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 300;
      letter-spacing: 0.1em; color: var(--color-text-muted);
    }
    .error-sub {
      font-size: 0.75rem; letter-spacing: 0.15em; font-style: italic;
      color: var(--color-text-faint);
    }

    /* CERTIFICATE */
    #certificate {
      opacity: 0; transition: opacity 1s var(--ease);
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center;
      padding: clamp(3.5rem, 10vw, 7rem) clamp(1.5rem, 6vw, 4rem) clamp(3rem, 8vw, 5rem);
    }
    #certificate.revealed { opacity: 1; }

    /* HEADER */
    .cert-logo {
      width: clamp(36px, 5vw, 54px); height: auto;
      opacity: 0.55; margin-bottom: 2.5rem;
    }
    .cert-eyebrow {
      font-size: clamp(0.55rem, 0.4rem + 0.3vw, 0.7rem);
      letter-spacing: 0.65em; text-transform: uppercase;
      color: var(--color-gold); margin-bottom: 1.8rem; opacity: 0.9;
    }
    .cert-piece-name {
      font-size: clamp(2rem, 5vw, 4.5rem); font-weight: 300;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text); line-height: 1; text-align: center;
      margin-bottom: 0.6rem;
    }
    .cert-piece-id {
      font-size: clamp(0.55rem, 0.4rem + 0.2vw, 0.7rem);
      letter-spacing: 0.55em; color: var(--color-text-faint);
      text-transform: uppercase; margin-bottom: 3rem;
    }
    .cert-rule {
      width: 36px; height: 1px;
      background: var(--color-gold); opacity: 0.35;
      margin-bottom: 3rem;
    }

    /* DETAILS */
    .cert-details {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 2rem 3.5rem; max-width: 480px; width: 100%;
      border: 1px solid var(--color-border);
      padding: 2.5rem 2rem; position: relative;
      margin-bottom: 3.5rem;
    }
    .cert-details::before {
      content: ''; position: absolute; top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--color-gold), transparent);
      opacity: 0.25;
    }
    @media (max-width: 400px) {
      .cert-details { grid-template-columns: 1fr; gap: 1.8rem; }
    }
    .cert-detail-label {
      font-size: clamp(0.5rem, 0.4rem + 0.2vw, 0.6rem);
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--color-text-faint); margin-bottom: 0.45rem;
    }
    .cert-detail-value {
      font-size: clamp(0.85rem, 0.7rem + 0.3vw, 1rem);
      font-weight: 400; letter-spacing: 0.06em; color: var(--color-text);
    }

    /* OWNER */
    .cert-owner {
      max-width: 480px; width: 100%;
      text-align: center; margin-bottom: 3.5rem;
    }
    .cert-owner-label {
      font-size: clamp(0.5rem, 0.4rem + 0.2vw, 0.6rem);
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--color-text-faint); margin-bottom: 0.9rem;
    }
    .cert-owner-name {
      font-size: clamp(1.1rem, 2vw, 1.7rem); font-weight: 300;
      letter-spacing: 0.15em; font-style: italic; color: var(--color-text);
      margin-bottom: 0.5rem;
    }
    .cert-owner-since {
      font-size: clamp(0.55rem, 0.4rem + 0.2vw, 0.65rem);
      letter-spacing: 0.3em; color: var(--color-text-faint);
      text-transform: uppercase;
    }

    /* PROVENANCE */
    .cert-provenance {
      max-width: 480px; width: 100%; margin-bottom: 3.5rem;
    }
    .cert-provenance-title {
      font-size: clamp(0.5rem, 0.4rem + 0.2vw, 0.6rem);
      letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--color-text-faint); text-align: center;
      margin-bottom: 1.5rem;
    }
    .cert-transfer-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0; border-bottom: 1px solid var(--color-divider); gap: 1rem;
    }
    .cert-transfer-item:first-of-type { border-top: 1px solid var(--color-divider); }
    .cert-transfer-from { font-size: 0.75rem; color: var(--color-text-muted); }
    .cert-transfer-arrow { color: var(--color-text-faint); opacity: 0.4; font-size: 0.8rem; flex-shrink: 0; }
    .cert-transfer-right { text-align: right; }
    .cert-transfer-to { font-size: 0.75rem; color: var(--color-text); }
    .cert-transfer-date { font-size: 0.6rem; color: var(--color-text-faint); letter-spacing: 0.1em; margin-top: 0.2rem; }

    /* FOOTER NOTE */
    .cert-footer {
      max-width: 420px; text-align: center;
    }
    .cert-footer-rule {
      width: 18px; height: 1px; background: var(--color-accent);
      opacity: 0.2; margin: 0 auto 1.5rem;
    }
    .cert-founder-note {
      font-size: clamp(0.7rem, 0.55rem + 0.3vw, 0.85rem);
      font-style: italic; color: var(--color-text-faint);
      letter-spacing: 0.08em; line-height: 2; opacity: 0.75;
      margin-bottom: 2.5rem;
    }
    .cert-brand {
      font-size: clamp(0.5rem, 0.4rem + 0.15vw, 0.6rem);
      letter-spacing: 0.7em; text-transform: uppercase;
      color: var(--color-text-faint); opacity: 0.35;
    }
  </style>
</head>
<body>

<svg class="grain" aria-hidden="true">
  <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#g)"/>
</svg>

<div id="loading">
  <div class="loading-sigil">
    <img src="./assets/sigil-logo.png" alt="">
  </div>
  <span class="loading-text">verifying provenance</span>
</div>

<div id="error-state">
  <span class="error-eyebrow">Phāesto Atelier</span>
  <h1 class="error-heading">Token not recognised.</h1>
  <p class="error-sub">This piece could not be verified.</p>
</div>

<div id="certificate">
  <img class="cert-logo" src="./assets/sigil-logo.png" alt="Phāesto">
  <p class="cert-eyebrow">Certificate of Authenticity</p>
  <h1 class="cert-piece-name" id="piece-name"></h1>
  <p class="cert-piece-id" id="piece-id"></p>
  <div class="cert-rule"></div>

  <div class="cert-details">
    <div>
      <div class="cert-detail-label">Material</div>
      <div class="cert-detail-value" id="d-material"></div>
    </div>
    <div>
      <div class="cert-detail-label">Weight</div>
      <div class="cert-detail-value" id="d-weight"></div>
    </div>
    <div>
      <div class="cert-detail-label">Edition</div>
      <div class="cert-detail-value" id="d-edition"></div>
    </div>
    <div>
      <div class="cert-detail-label">Forged</div>
      <div class="cert-detail-value" id="d-forge"></div>
    </div>
  </div>

  <div class="cert-owner">
    <div class="cert-owner-label">Currently held by</div>
    <div class="cert-owner-name" id="owner-name"></div>
    <div class="cert-owner-since" id="owner-since"></div>
  </div>

  <div class="cert-provenance" id="provenance" style="display:none">
    <div class="cert-provenance-title">Provenance</div>
    <div id="transfer-log"></div>
  </div>

  <div class="cert-footer">
    <div class="cert-footer-rule"></div>
    <p class="cert-founder-note" id="founder-note"></p>
    <p class="cert-brand">Phāesto Atelier &middot; Est. MMXXVI</p>
  </div>
</div>

<script>
(function () {
  const parts = window.location.pathname.split('/verify/');
  const token = parts[1] ? parts[1].split('/')[0] : null;

  function showError() {
    document.getElementById('loading').classList.add('fade-out');
    setTimeout(function () {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-state').classList.add('visible');
    }, 900);
  }

  function reveal() {
    document.getElementById('loading').classList.add('fade-out');
    setTimeout(function () {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('certificate').classList.add('revealed');
    }, 900);
  }

  function fmt(dateStr, opts) {
    if (!dateStr) return '\u2014';
    try { return new Date(dateStr).toLocaleDateString('en-US', opts); }
    catch (e) { return dateStr; }
  }

  if (!token) { showError(); return; }

  fetch('/api/piece/' + token)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) throw new Error(data.error);
      var p = data.piece;
      var o = data.owner;
      var tl = data.transferLog || [];

      document.getElementById('piece-name').textContent = p.piece_name || p.name || '\u2014';
      document.getElementById('piece-id').textContent = p.piece_id || '\u2014';
      document.getElementById('d-material').textContent = p.material || p.metal || '925 Sterling Silver';
      document.getElementById('d-weight').textContent = p.weight_grams ? p.weight_grams + 'g' : '\u2014';
      document.getElementById('d-edition').textContent = p.edition_number ? p.edition_number + ' of 1' : '1 of 1';
      document.getElementById('d-forge').textContent = fmt(p.forge_date, { year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('owner-name').textContent = o.name || '\u2014';
      document.getElementById('owner-since').textContent = o.claimed_at
        ? 'Since ' + fmt(o.claimed_at, { year: 'numeric', month: 'long' })
        : '';

      if (p.founder_note) {
        document.getElementById('founder-note').textContent = '\u201c' + p.founder_note + '\u201d';
      }

      if (tl.length > 0) {
        var section = document.getElementById('provenance');
        var log = document.getElementById('transfer-log');
        section.style.display = 'block';
        tl.forEach(function (t) {
          var item = document.createElement('div');
          item.className = 'cert-transfer-item';
          item.innerHTML =
            '<span class="cert-transfer-from">' + (t.from_owner_email || '\u2014') + '</span>' +
            '<span class="cert-transfer-arrow">&#8594;</span>' +
            '<div class="cert-transfer-right">' +
              '<div class="cert-transfer-to">' + (t.to_owner_email || '\u2014') + '</div>' +
              '<div class="cert-transfer-date">' + fmt(t.transferred_at, { year: 'numeric', month: 'short', day: 'numeric' }) + '</div>' +
            '</div>';
          log.appendChild(item);
        });
      }

      reveal();
    })
    .catch(showError);
})();
</script>
</body>
</html>
